catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    '@antfu/ni': ^30.1.0
    bumpp: ^11.0.1
    eslint: ^10.2.1
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.10
    tsx: ^4.21.0
    typescript: ^6.0.3
    vite: ^8.0.9
  inlined:
    '@antfu/utils': ^9.3.0
  testing:
    tsdown-stale-guard: ^0.1.1
    tsnapi: ^0.3.2
    vitest: ^4.1.5
  types:
    '@types/node': ^25.6.0
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
